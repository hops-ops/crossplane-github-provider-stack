    package: xpkg.crossplane.io/crossplane-contrib/provider-upjet-github
    version: '>=v0.19.0'
  description: Installs provider-upjet-github and optionally composes its Secret-backed
    ProviderConfig.
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # crossplane-github-provider-stack
    Installs provider-upjet-github and optionally composes its Secret-backed ProviderConfig.
  repository: ghcr.io/hops-ops/crossplane-github-provider-stack
  source: github.com/hops-ops/crossplane-github-provider-stack
