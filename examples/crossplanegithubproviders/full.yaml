apiVersion: hops.ops.com.ai/v1alpha1
kind: CrossplaneGitHubProvider
metadata:
  name: github
  namespace: default
spec:
  clusterName: my-cluster
  kubernetesProviderConfigRef:
    name: my-cluster
  githubOrg: hops-ops
  secretName: github-token
  externalSecret:
    remoteKey: github-provider-token
  runtimeConfig:
    requestsCpu: 100m
    requestsMemory: 256Mi
  nodePool:
    enabled: true
